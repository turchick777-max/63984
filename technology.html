  <style>
    :root {
      --bg: #141518;
      --card-bg: #1e2024;
      --card-border: rgba(255,255,255,.06);
      --accent: rgba(255,255,255,.92);
      --accent-dim: rgba(255,255,255,.06);
      --text: rgba(255,255,255,.92);
      --text-dim: rgba(255,255,255,.58);
      --text-muted: rgba(255,255,255,.3);
      --card-w: 380px;
      --card-gap: 24px;
      --radius: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      padding: 40px 48px 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .header .hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .header .hint span {
      color: rgba(255,255,255,.55);
    }

    /* ── Lang switch ── */
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 3px;
      transition: color .2s, background .2s;
    }

    .lang-btn:hover { color: rgba(255,255,255,.7); }

    .lang-btn.active {
      color: var(--text);
      background: rgba(255,255,255,.07);
    }

    .lang-sep {
      color: var(--text-muted);
      font-size: 11px;
      user-select: none;
      padding: 0 1px;
    }

    /* ── Cards rail ── */
    .rail-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 32px 0 40px;
    }

    .rail {
      display: flex;
      gap: var(--card-gap);
      padding: 0 48px;
      height: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
    }

    .rail:active { cursor: grabbing; }
    .rail::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .card {
      flex: 0 0 var(--card-w);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 36px 32px;
      scroll-snap-align: start;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.12) transparent;
      transition: border-color .3s, box-shadow .3s;
    }

    .card:hover {
      border-color: rgba(255,255,255,.12);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .card::-webkit-scrollbar { width: 4px; }
    .card::-webkit-scrollbar-track { background: transparent; }
    .card::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }

    .card-number {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-body h2 {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .card-body h2 .accent {
      color: var(--text);
    }

    .card-body p {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .card-body h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-top: 8px;
      margin-bottom: 10px;
      padding-left: 12px;
      border-left: 2px solid rgba(255,255,255,.2);
    }

    .card-body ul, .card-body ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    .card-body li {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-body li::marker {
      color: var(--text-muted);
    }

    .card-body .note {
      font-size: 13px;
      font-style: italic;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
    }

    .card-body .comparison-group {
      margin-bottom: 16px;
    }

    .card-body .comparison-group h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: .02em;
    }

    .card-body .comparison-group ul {
      margin-bottom: 8px;
    }

    .card-body .scope-link {
      display: inline;
      color: var(--text);
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,.25);
      text-underline-offset: 3px;
    }

    .card-body .scope-link:hover {
      color: #fff;
      text-decoration-color: rgba(255,255,255,.6);
    }

    /* ── Bottom bar with progress strip ── */
    .bottom-bar {
      flex-shrink: 0;
      padding: 0 48px 32px;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,.6);
      border-radius: 1px;
      transition: width .3s ease;
      width: 0%;
    }

    /* ── Arrow buttons ── */
    .arrow-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(22,27,34,.85);
      border: 1px solid var(--card-border);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
      backdrop-filter: blur(8px);
    }

    .arrow-btn:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.18);
    }

    .arrow-btn.left { left: 12px; }
    .arrow-btn.right { right: 12px; }
  </style>

          <p>AQUINTAQA is based on a volumetric gas\u2013sorbent separation mechanism designed to remove dissolved ions from saline water through controlled physicochemical interaction within a multiphase system.</p>

        cards: [

          <p>AQUINTAQA \u043e\u0441\u043d\u043e\u0432\u0430\u043d\u0430 \u043d\u0430 \u043e\u0431\u044a\u0451\u043c\u043d\u043e-\u0433\u0430\u0437\u043e-\u0441\u043e\u0440\u0431\u0435\u043d\u0442\u043d\u043e\u043c \u043c\u0435\u0445\u0430\u043d\u0438\u0437\u043c\u0435 \u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f, \u043f\u0440\u0435\u0434\u043d\u0430\u0437\u043d\u0430\u0447\u0435\u043d\u043d\u043e\u043c \u0434\u043b\u044f \u0443\u0434\u0430\u043b\u0435\u043d\u0438\u044f \u0440\u0430\u0441\u0442\u0432\u043e\u0440\u0451\u043d\u043d\u044b\u0445 \u0438\u043e\u043d\u043e\u0432 \u0438\u0437 \u0441\u043e\u043b\u0451\u043d\u043e\u0439 \u0432\u043e\u0434\u044b \u0437\u0430 \u0441\u0447\u0451\u0442 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0438\u0440\u0443\u0435\u043c\u043e\u0433\u043e \u0444\u0438\u0437\u0438\u043a\u043e-\u0445\u0438\u043c\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u0432 \u043c\u043d\u043e\u0433\u043e\u0444\u0430\u0437\u043d\u043e\u0439 \u0441\u0438\u0441\u0442\u0435\u043c\u0435.</p>

          <ul>
            <li>\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0438\u0440\u0443\u0435\u043c\u043e\u0435 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0432 \u0433\u0430\u0437\u043e\u0432\u043e\u0439 \u0444\u0430\u0437\u0435;</li>
            <li>\u0441\u0435\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0435 \u0441\u0432\u044f\u0437\u044b\u0432\u0430\u043d\u0438\u0435 \u0438\u043e\u043d\u043e\u0432 \u0441\u043e\u0440\u0431\u0435\u043d\u0442\u043d\u043e\u0439 \u0441\u0440\u0435\u0434\u043e\u0439;</li>
            <li>\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0439 \u043c\u0430\u0441\u0441\u043e\u043f\u0435\u0440\u0435\u043d\u043e\u0441 \u0432 \u043e\u0431\u044a\u0451\u043c\u043d\u043e\u0439 \u0440\u0435\u0430\u043a\u0442\u043e\u0440\u043d\u043e\u0439 \u0441\u0440\u0435\u0434\u0435.</li>
          </ul>
          <p>\u0420\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u043f\u0440\u043e\u0438\u0441\u0445\u043e\u0434\u0438\u0442 \u0432 \u0434\u0438\u043d\u0430\u043c\u0438\u0447\u0435\u0441\u043a\u0438 \u0440\u0435\u0433\u0443\u043b\u0438\u0440\u0443\u0435\u043c\u043e\u0439 \u043a\u0430\u043c\u0435\u0440\u0435, \u0441\u043f\u0440\u043e\u0435\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0439 \u0434\u043b\u044f \u043e\u043f\u0442\u0438\u043c\u0438\u0437\u0430\u0446\u0438\u0438 \u0438\u043e\u043d\u043d\u043e\u0439 \u0441\u0435\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438, \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u0438 \u043f\u0440\u043e\u0446\u0435\u0441\u0441\u0430 \u0438 \u044d\u043d\u0435\u0440\u0433\u0435\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0431\u0430\u043b\u0430\u043d\u0441\u0430.</p>
          <p>\u041f\u043b\u0430\u0442\u0444\u043e\u0440\u043c\u0430 \u0438\u043c\u0435\u0435\u0442 \u043c\u043e\u0434\u0443\u043b\u044c\u043d\u0443\u044e \u0430\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0443 \u0438 \u043c\u043e\u0436\u0435\u0442 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0438\u0440\u043e\u0432\u0430\u0442\u044c\u0441\u044f \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438 \u043e\u0442 \u0441\u043e\u043b\u0451\u043d\u043e\u0441\u0442\u0438 \u0438\u0441\u0445\u043e\u0434\u043d\u043e\u0439 \u0432\u043e\u0434\u044b \u0438 \u0440\u0430\u0431\u043e\u0447\u0438\u0445 \u0443\u0441\u043b\u043e\u0432\u0438\u0439.</p>`,

          /* 1 – Архитектура верхнего уровня */
          `<h2>\u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430 <span class="accent">\u0432\u0435\u0440\u0445\u043d\u0435\u0433\u043e \u0443\u0440\u043e\u0432\u043d\u044f</span></h2>
          <p>\u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430 \u0441\u0438\u0441\u0442\u0435\u043c\u044b \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442:</p>
          <ol>
            <li>\u043c\u043e\u0434\u0443\u043b\u044c \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0438 \u0438\u0441\u0445\u043e\u0434\u043d\u043e\u0439 \u0432\u043e\u0434\u044b;</li>
            <li>\u043e\u0431\u044a\u0451\u043c\u043d\u0443\u044e \u0440\u0435\u0430\u043a\u0446\u0438\u043e\u043d\u043d\u0443\u044e \u043a\u0430\u043c\u0435\u0440\u0443;</li>
            <li>\u0431\u043b\u043e\u043a \u0446\u0438\u0440\u043a\u0443\u043b\u044f\u0446\u0438\u0438 \u0438 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u0433\u0430\u0437\u043e\u0432\u043e\u0439 \u0444\u0430\u0437\u043e\u0439;</li>
            <li>\u043f\u043e\u0434\u0441\u0438\u0441\u0442\u0435\u043c\u0443 \u0440\u0435\u0433\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u0438 \u0441\u043e\u0440\u0431\u0435\u043d\u0442\u0430;</li>
            <li>\u043c\u043e\u0434\u0443\u043b\u044c \u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f \u0438 \u0438\u0437\u0432\u043b\u0435\u0447\u0435\u043d\u0438\u044f;</li>
            <li>\u0441\u0438\u0441\u0442\u0435\u043c\u0443 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u0438 \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433\u0430 \u043f\u0440\u043e\u0446\u0435\u0441\u0441\u0430.</li>
          </ol>
          <p>\u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430 \u0441\u043f\u0440\u043e\u0435\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0430 \u0434\u043b\u044f \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u044f:</p>
          <ul>
            <li>\u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u0438 \u043a \u0440\u0430\u0437\u043b\u0438\u0447\u043d\u044b\u043c \u0442\u0438\u043f\u0430\u043c \u0444\u0438\u0434\u043e\u0432;</li>
            <li>\u0441\u0442\u0430\u0431\u0438\u043b\u044c\u043d\u043e\u0439 \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u044b;</li>
            <li>\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0438\u0440\u0443\u0435\u043c\u043e\u0439 \u0441\u0440\u0435\u0434\u044b \u043c\u0430\u0441\u0441\u043e\u043f\u0435\u0440\u0435\u043d\u043e\u0441\u0430;</li>
            <li>\u043f\u0440\u043e\u043c\u044b\u0448\u043b\u0435\u043d\u043d\u043e\u0433\u043e \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.</li>
          </ul>
          <p>\u041c\u0435\u043c\u0431\u0440\u0430\u043d\u043d\u044b\u0435 \u043f\u0430\u043a\u0435\u0442\u044b \u0432\u044b\u0441\u043e\u043a\u043e\u0433\u043e \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u043d\u0435 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u044e\u0442\u0441\u044f.<br>\u0421\u0442\u0430\u0434\u0438\u0438 \u0432\u044b\u0441\u043e\u043a\u043e\u0442\u0435\u043c\u043f\u0435\u0440\u0430\u0442\u0443\u0440\u043d\u043e\u0433\u043e \u0438\u0441\u043f\u0430\u0440\u0435\u043d\u0438\u044f \u043d\u0435 \u0442\u0440\u0435\u0431\u0443\u044e\u0442\u0441\u044f.</p>`,

          /* 2 – Рабочий диапазон */
          `<h2>\u0420\u0430\u0431\u043e\u0447\u0438\u0439 <span class="accent">\u0434\u0438\u0430\u043f\u0430\u0437\u043e\u043d</span></h2>
          <p>\u041f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0451\u043d\u043d\u044b\u0435 \u0440\u0430\u0431\u043e\u0447\u0438\u0435 \u0434\u0438\u0430\u043f\u0430\u0437\u043e\u043d\u044b (\u043d\u0430 \u0443\u0440\u043e\u0432\u043d\u0435 \u043f\u0438\u043b\u043e\u0442\u0430):</p>
          <ul>
            <li>\u0434\u0438\u0430\u043f\u0430\u0437\u043e\u043d \u0441\u043e\u043b\u0451\u043d\u043e\u0441\u0442\u0438 \u0438\u0441\u0445\u043e\u0434\u043d\u043e\u0439 \u0432\u043e\u0434\u044b: 15\u2013210 g/L;</li>
            <li>\u043d\u0435\u043f\u0440\u0435\u0440\u044b\u0432\u043d\u044b\u0435 \u043f\u0440\u043e\u0433\u043e\u043d\u044b: \u2265800 \u0447\u0430\u0441\u043e\u0432;</li>
            <li>\u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0430 \u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u0440\u0430\u0437\u043b\u0438\u0447\u043d\u044b\u043c\u0438 \u0442\u0438\u043f\u0430\u043c\u0438 \u0444\u0438\u0434\u043e\u0432;</li>
            <li>\u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0451\u043d \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0439 \u044d\u0444\u0444\u0435\u043a\u0442 \u0441\u043d\u0438\u0436\u0435\u043d\u0438\u044f \u0438\u043e\u043d\u043d\u043e\u0439 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0438.</li>
          </ul>
          <p>\u0418\u0441\u043f\u044b\u0442\u0430\u043d\u0438\u044f \u0432\u043a\u043b\u044e\u0447\u0430\u044e\u0442 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0438\u0440\u0443\u0435\u043c\u0443\u044e \u043b\u0430\u0431\u043e\u0440\u0430\u0442\u043e\u0440\u043d\u0443\u044e \u0432\u0430\u043b\u0438\u0434\u0430\u0446\u0438\u044e \u0434\u043e \u0438 \u043f\u043e\u0441\u043b\u0435 \u0446\u0438\u043a\u043b\u043e\u0432 \u043e\u0431\u0440\u0430\u0431\u043e\u0442\u043a\u0438 (\u043d\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u0430\u044f \u043b\u0430\u0431\u043e\u0440\u0430\u0442\u043e\u0440\u043d\u0430\u044f \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u2014 \u043f\u043e NDA).</p>`,

          /* 3 – Сравнение */
          `<h2>\u0421\u0440\u0430\u0432\u043d\u0435\u043d\u0438\u0435 \u0441 <span class="accent">\u0442\u0440\u0430\u0434\u0438\u0446\u0438\u043e\u043d\u043d\u044b\u043c \u043e\u043f\u0440\u0435\u0441\u043d\u0435\u043d\u0438\u0435\u043c</span></h2>
          <div class="comparison-group">
            <h4>\u041e\u0431\u0440\u0430\u0442\u043d\u044b\u0439 \u043e\u0441\u043c\u043e\u0441 (RO)</h4>
            <ul>
              <li>\u043c\u0435\u043c\u0431\u0440\u0430\u043d\u043d\u044b\u0439 \u043f\u0440\u043e\u0446\u0435\u0441\u0441, \u043e\u0441\u043d\u043e\u0432\u0430\u043d\u043d\u044b\u0439 \u043d\u0430 \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u0438;</li>
              <li>\u0440\u0438\u0441\u043a \u043c\u0435\u043c\u0431\u0440\u0430\u043d\u043d\u043e\u0433\u043e \u0437\u0430\u0433\u0440\u044f\u0437\u043d\u0435\u043d\u0438\u044f \u0438 \u043e\u0431\u0440\u0430\u0437\u043e\u0432\u0430\u043d\u0438\u044f \u043e\u0442\u043b\u043e\u0436\u0435\u043d\u0438\u0439;</li>
              <li>\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u043e\u0442 \u043d\u0430\u0441\u043e\u0441\u043e\u0432 \u0432\u044b\u0441\u043e\u043a\u043e\u0433\u043e \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u044f;</li>
              <li>\u0447\u0443\u0432\u0441\u0442\u0432\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043a \u0441\u043e\u0441\u0442\u0430\u0432\u0443 \u0438\u0441\u0445\u043e\u0434\u043d\u043e\u0439 \u0432\u043e\u0434\u044b.</li>
            </ul>
          </div>
          <div class="comparison-group">
            <h4>\u0422\u0435\u0440\u043c\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0434\u0438\u0441\u0442\u0438\u043b\u043b\u044f\u0446\u0438\u044f</h4>
            <ul>
              <li>\u044d\u043d\u0435\u0440\u0433\u043e\u0451\u043c\u043a\u0438\u0439 \u0444\u0430\u0437\u043e\u0432\u044b\u0439 \u043f\u0435\u0440\u0435\u0445\u043e\u0434;</li>
              <li>\u0432\u044b\u0441\u043e\u043a\u0430\u044f \u043a\u0430\u043f\u0438\u0442\u0430\u043b\u043e\u0451\u043c\u043a\u043e\u0441\u0442\u044c \u0438\u043d\u0444\u0440\u0430\u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u044b;</li>
              <li>\u043a\u0440\u0443\u043f\u043d\u044b\u0435 \u0441\u0442\u0430\u0446\u0438\u043e\u043d\u0430\u0440\u043d\u044b\u0435 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438.</li>
            </ul>
          </div>
          <div class="comparison-group aq">
            <h4>\u041f\u043b\u0430\u0442\u0444\u043e\u0440\u043c\u0430 AQUINTAQA</h4>
            <ul>
              <li>\u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u0435 \u043c\u0435\u043c\u0431\u0440\u0430\u043d\u043d\u043e\u0433\u043e \u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f;</li>
              <li>\u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u0435 \u043d\u0435\u043e\u0431\u0445\u043e\u0434\u0438\u043c\u043e\u0441\u0442\u0438 \u0432 \u0432\u044b\u0441\u043e\u043a\u043e\u043c \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u0438;</li>
              <li>\u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u0435 \u0437\u0430\u0442\u0440\u0430\u0442 \u044d\u043d\u0435\u0440\u0433\u0438\u0438 \u043d\u0430 \u043c\u0430\u0441\u0441\u043e\u0432\u044b\u0439 \u0444\u0430\u0437\u043e\u0432\u044b\u0439 \u043f\u0435\u0440\u0435\u0445\u043e\u0434;</li>
              <li>\u043e\u0431\u044a\u0451\u043c\u043d\u044b\u0439 \u0438\u043e\u043d-\u0441\u0435\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u043c\u0435\u0445\u0430\u043d\u0438\u0437\u043c;</li>
              <li>\u043c\u043e\u0434\u0443\u043b\u044c\u043d\u0430\u044f \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u044f \u0440\u0435\u0430\u043a\u0442\u043e\u0440\u0430.</li>
            </ul>
          </div>
          <div class="note">\u041e\u0442\u043b\u0438\u0447\u0438\u0435 \u043d\u043e\u0441\u0438\u0442 \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u043d\u044b\u0439, \u0430 \u043d\u0435 \u0438\u043d\u043a\u0440\u0435\u043c\u0435\u043d\u0442\u0430\u043b\u044c\u043d\u044b\u0439 \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440.</div>`,

          /* 4 – IP и управление процессом */
          `<h2>IP \u0438 <span class="accent">\u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u043f\u0440\u043e\u0446\u0435\u0441\u0441\u043e\u043c</span></h2>
          <p>\u0422\u0435\u0445\u043d\u043e\u043b\u043e\u0433\u0438\u044f \u0443\u043f\u0440\u0430\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0432 \u0440\u0430\u043c\u043a\u0430\u0445 \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0439 IP-\u043c\u043e\u0434\u0435\u043b\u0438, \u043e\u0445\u0432\u0430\u0442\u044b\u0432\u0430\u044e\u0449\u0435\u0439:</p>
          <ul>
            <li>\u043f\u0440\u0438\u043d\u0446\u0438\u043f\u044b \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u0438 \u0440\u0435\u0430\u043a\u0442\u043e\u0440\u0430;</li>
            <li>\u043a\u043e\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u044e \u0441\u043e\u0440\u0431\u0435\u043d\u0442\u043d\u043e\u0439 \u0441\u0438\u0441\u0442\u0435\u043c\u044b;</li>
            <li>\u043c\u0435\u0442\u043e\u0434\u043e\u043b\u043e\u0433\u0438\u044e \u0433\u0430\u0437\u043e-\u0436\u0438\u0434\u043a\u043e\u0441\u0442\u043d\u043e\u0433\u043e \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f;</li>
            <li>\u0430\u043b\u0433\u043e\u0440\u0438\u0442\u043c\u044b \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u0438 \u0440\u0430\u0431\u043e\u0447\u0438\u0435 \u0440\u0435\u0436\u0438\u043c\u044b.</li>
          </ul>
          <p>\u041e\u043f\u0435\u0440\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0437\u043d\u0430\u043d\u0438\u044f \u0440\u0430\u0441\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u044b \u043f\u043e \u043a\u043e\u043d\u0442\u0443\u0440\u0430\u043c \u0434\u043e\u0441\u0442\u0443\u043f\u0430. \u041f\u043e\u0434\u0440\u043e\u0431\u043d\u044b\u0435 \u0442\u0435\u0445\u043d\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043f\u0430\u0440\u0430\u043c\u0435\u0442\u0440\u044b \u0440\u0430\u0441\u043a\u0440\u044b\u0432\u0430\u044e\u0442\u0441\u044f \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u043e\u0441\u043b\u0435 \u043f\u043e\u0434\u043f\u0438\u0441\u0430\u043d\u0438\u044f e-NDA \u0432 \u0440\u0430\u043c\u043a\u0430\u0445 Data Room.</p>
          <div class="note">\u0412\u0441\u044f \u0442\u0435\u0445\u043d\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u0430\u0446\u0438\u044f \u0438\u043c\u0435\u0435\u0442 \u0432\u0435\u0440\u0441\u0438\u043e\u043d\u043d\u044b\u0439 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u0442 \u043f\u043e\u043b\u043d\u0443\u044e \u043f\u0440\u043e\u0441\u043b\u0435\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c.</div>`,

          /* 5 – Инженерный статус */
          `<h2>\u0418\u043d\u0436\u0435\u043d\u0435\u0440\u043d\u044b\u0439 <span class="accent">\u0441\u0442\u0430\u0442\u0443\u0441</span></h2>
          <p>\u0422\u0435\u043a\u0443\u0449\u0438\u0439 \u0443\u0440\u043e\u0432\u0435\u043d\u044c \u0437\u0440\u0435\u043b\u043e\u0441\u0442\u0438 (\u0441\u043c. TRL Snapshot):</p>
          <ul>
            <li>\u0431\u0430\u0437\u043e\u0432\u044b\u0439 \u043f\u0440\u0438\u043d\u0446\u0438\u043f \u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0451\u043d;</li>
            <li>\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0438\u0440\u0443\u0435\u043c\u044b\u0435 \u043f\u0440\u043e\u0442\u043e\u0442\u0438\u043f\u044b \u043f\u0440\u043e\u0434\u0435\u043c\u043e\u043d\u0441\u0442\u0440\u0438\u0440\u043e\u0432\u0430\u043d\u044b;</li>
            <li>\u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0430 \u0440\u0430\u0431\u043e\u0442\u0430 \u0438\u043d\u0442\u0435\u0433\u0440\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0433\u043e \u043f\u0438\u043b\u043e\u0442\u0430 \u22658\u0030\u0030 \u0447\u0430\u0441\u043e\u0432;</li>
            <li>\u043d\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u0430\u044f \u043b\u0430\u0431\u043e\u0440\u0430\u0442\u043e\u0440\u043d\u0430\u044f \u0432\u0435\u0440\u0438\u0444\u0438\u043a\u0430\u0446\u0438\u044f \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u0430.</li>
          </ul>
          <p>\u0422\u0435\u0445\u043d\u043e\u043b\u043e\u0433\u0438\u044f \u043f\u0435\u0440\u0435\u0445\u043e\u0434\u0438\u0442 \u043e\u0442 \u043f\u0438\u043b\u043e\u0442\u043d\u043e\u0439 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u0438 \u043a \u044d\u0442\u0430\u043f\u0443 \u043f\u0440\u043e\u043c\u044b\u0448\u043b\u0435\u043d\u043d\u043e\u0433\u043e \u0438\u043d\u0436\u0435\u043d\u0435\u0440\u043d\u043e\u0433\u043e \u043f\u0440\u043e\u0435\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.</p>`,

          /* 6 – Область охвата страницы */
          `<h2>\u041e\u0431\u043b\u0430\u0441\u0442\u044c \u043e\u0445\u0432\u0430\u0442\u0430 <span class="accent">\u0441\u0442\u0440\u0430\u043d\u0438\u0446\u044b</span></h2>
          <p>\u041d\u0430 \u0434\u0430\u043d\u043d\u043e\u0439 \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0435 \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u043e \u0442\u043e\u043b\u044c\u043a\u043e \u0432\u044b\u0441\u043e\u043a\u043e\u0443\u0440\u043e\u0432\u043d\u0435\u0432\u043e\u0435 \u0430\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u043d\u043e\u0435 \u0438 \u0438\u043d\u0436\u0435\u043d\u0435\u0440\u043d\u043e\u0435 \u043e\u043f\u0438\u0441\u0430\u043d\u0438\u0435.</p>
          <p>\u041f\u043e\u0434\u0440\u043e\u0431\u043d\u043e\u0441\u0442\u0438 \u0432\u0430\u043b\u0438\u0434\u0430\u0446\u0438\u0438 \u2192 \u0441\u043c. <a href="quality.html" target="_blank" class="scope-link">Quality &amp; Validation</a>.</p>
          <p>\u0418\u043d\u0432\u0435\u0441\u0442\u0438\u0446\u0438\u043e\u043d\u043d\u0430\u044f \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u0430 \u2192 \u0441\u043c. <a href="investor-access.html" target="_blank" class="scope-link">Investor Page</a>.</p>`
        ]
      }
    };

    /* ── Language switcher ── */
    const langBtns = document.querySelectorAll('.lang-btn');
    let currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      langBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
      });

      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const key = el.dataset.i18nHtml;
        if (i18n[lang][key] !== undefined) el.innerHTML = i18n[lang][key];
      });

      document.querySelectorAll('[data-card-body]').forEach(el => {
        const idx = parseInt(el.dataset.cardBody);
        if (i18n[lang].cards[idx] !== undefined) el.innerHTML = i18n[lang].cards[idx];
      });

      document.title = i18n[lang].pageTitle;
    }

    langBtns.forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));

    /* ── Init: render English content ── */
    setLang('en');

    /* ── Rail navigation ── */
    const rail = document.getElementById('rail');
    const cards = Array.from(rail.querySelectorAll('.card'));
    const progressFill = document.getElementById('progress-fill');
    const leftBtn = document.getElementById('arrow-left');
    const rightBtn = document.getElementById('arrow-right');
    const CARD_W = 380;
    const GAP = 24;
    const STEP = CARD_W + GAP;
    let activeIndex = 0;

    function updateProgress() {
      const maxScroll = rail.scrollWidth - rail.clientWidth;
      const pct = maxScroll > 0 ? (rail.scrollLeft / maxScroll) * 100 : 0;
      progressFill.style.width = pct + '%';
      const idx = Math.round(rail.scrollLeft / STEP);
      activeIndex = Math.max(0, Math.min(idx, cards.length - 1));
    }

    const updateDots = updateProgress;

    function scrollToCard(i) {
      rail.scrollTo({ left: i * STEP, behavior: 'smooth' });
    }

    leftBtn.addEventListener('click', () => {
      const next = activeIndex <= 0 ? cards.length - 1 : activeIndex - 1;
      scrollToCard(next);
    });

    rightBtn.addEventListener('click', () => {
      const next = activeIndex >= cards.length - 1 ? 0 : activeIndex + 1;
      scrollToCard(next);
    });

    rail.addEventListener('scroll', updateDots, { passive: true });

    let isDown = false, startX, scrollStart;

    rail.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - rail.offsetLeft;
      scrollStart = rail.scrollLeft;
      rail.style.scrollSnapType = 'none';
    });

    rail.addEventListener('mouseleave', () => { isDown = false; rail.style.scrollSnapType = 'x mandatory'; });
    rail.addEventListener('mouseup', () => { isDown = false; rail.style.scrollSnapType = 'x mandatory'; });

    rail.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - rail.offsetLeft;
      const walk = (x - startX) * 1.5;
      rail.scrollLeft = scrollStart - walk;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') { rightBtn.click(); }
      if (e.key === 'ArrowLeft') { leftBtn.click(); }
    });
  })();
  </script>
