  <title>Quality &amp; Validation — AQUINTAQA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #141518;
      --card-bg: #1e2024;
      --card-border: rgba(255,255,255,.06);
      --accent: rgba(255,255,255,.92);
      --accent-dim: rgba(255,255,255,.06);
      --text: rgba(255,255,255,.92);
      --text-dim: rgba(255,255,255,.58);
      --text-muted: rgba(255,255,255,.3);
      --card-w: 380px;
      --card-gap: 24px;
      --radius: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      padding: 40px 48px 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .header .hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .header .hint span {
      color: rgba(255,255,255,.55);
    }

    /* ── Lang switch ── */
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 3px;
      transition: color .2s, background .2s;
    }

    .lang-btn:hover { color: rgba(255,255,255,.7); }

    .lang-btn.active {
      color: var(--text);
      background: rgba(255,255,255,.07);
    }

    .lang-sep {
      color: var(--text-muted);
      font-size: 11px;
      user-select: none;
      padding: 0 1px;
    }

    /* ── Cards rail ── */
    .rail-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 32px 0 40px;
    }

    .rail {
      display: flex;
      gap: var(--card-gap);
      padding: 0 48px;
      height: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
    }

    .rail:active { cursor: grabbing; }
    .rail::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .card {
      flex: 0 0 var(--card-w);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 36px 32px;
      scroll-snap-align: start;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.12) transparent;
      transition: border-color .3s, box-shadow .3s;
    }

    .card:hover {
      border-color: rgba(255,255,255,.12);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .card::-webkit-scrollbar { width: 4px; }
    .card::-webkit-scrollbar-track { background: transparent; }
    .card::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }

    .card-number {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-body h2 {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .card-body h2 .accent {
      color: var(--text);
    }

    .card-body p {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .card-body h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-top: 8px;
      margin-bottom: 10px;
      padding-left: 12px;
      border-left: 2px solid rgba(255,255,255,.2);
    }

    .card-body ul, .card-body ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    .card-body li {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-body li::marker {
      color: var(--text-muted);
    }

    .card-body .note {
      font-size: 13px;
      font-style: italic;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
    }

    .card-body .scope-link {
      display: inline;
      color: var(--text);
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,.25);
      text-underline-offset: 3px;
    }

    .card-body .scope-link:hover {
      color: #fff;
      text-decoration-color: rgba(255,255,255,.6);
    }

    /* ── Bottom bar with progress strip ── */
    .bottom-bar {
      flex-shrink: 0;
      padding: 0 48px 32px;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,.6);
      border-radius: 1px;
      transition: width .3s ease;
      width: 0%;
    }

    /* ── Arrow buttons ── */
    .arrow-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(22,27,34,.85);
      border: 1px solid var(--card-border);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
      backdrop-filter: blur(8px);
    }

    .arrow-btn:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.18);
    }

    .arrow-btn.left { left: 12px; }
    .arrow-btn.right { right: 12px; }
  </style>

  <script>
  (() => {
    /* ── Translations ── */
    const i18n = {
      en: {
        back: '← Back',
        title: 'QUALITY & VALIDATION',
        subtitle: 'Process Control, Testing Discipline, and External Verification',
        hint: 'Scroll horizontally or use <span>\u2190 \u2192</span> arrows',
        pageTitle: 'Quality & Validation \u2014 AQUINTAQA',
        cards: [
          /* 0 – Quality Philosophy */
          `<h2>Quality <span class="accent">Philosophy</span></h2>
          <p>AQUINTAQA is developed as a controlled engineering system rather than an experimental laboratory concept.</p>
          <p>The process is governed by defined operating parameters, traceable testing cycles, and structured documentation practices.</p>
          <p>Quality is approached as a system property, not a performance claim. Every configuration is evaluated within defined feed ranges, monitored operating envelopes, and repeatable procedures. Process stability, ion reduction directionality, and recovery ratios are assessed under documented baseline conditions.</p>
          <p>The objective is not only to demonstrate technical feasibility, but to ensure that the system behaves predictably across validated feed compositions and operating configurations. All technical iterations are logged, version-controlled, and reviewed under internal governance procedures.</p>`,

          /* 1 – Testing Methodology */
          `<h2>Testing <span class="accent">Methodology</span></h2>
          <p>Validation activities are conducted using controlled sample preparation and documented baseline measurements prior to each run.</p>
          <p>Testing framework includes:</p>
          <ul>
            <li>Defined feed salinity and composition parameters</li>
            <li>Controlled reactor configuration and gas\u2013sorbent dosing conditions</li>
            <li>Continuous monitoring of process stability</li>
            <li>Structured before/after sampling</li>
          </ul>
          <p>Each testing cycle begins with baseline characterization of the incoming feed (TDS, ion composition, and key parameters). Following controlled operation under documented settings, post-treatment samples are collected and prepared according to traceable procedures.</p>`,

          /* 2 – Independent Validation */
          `<h2>Independent <span class="accent">Validation</span></h2>
          <p>External laboratory involvement forms a core component of the validation process.</p>
          <p>Independent testing covers:</p>
          <ul>
            <li>Pre- and post-treatment analytical verification</li>
            <li>Chemical parameter confirmation</li>
            <li>Laboratory measurement protocols aligned with recognized analytical standards</li>
          </ul>
          <p>All laboratory interactions are documented. Sample origin, preparation method, and handling procedures are recorded to maintain data integrity.</p>
          <p>Disclosure framework:</p>
          <ul>
            <li>Public site: high-level validation status only</li>
            <li>Post e-NDA: laboratory reports, analytical methods, extended datasets</li>
          </ul>
          <p>No certification or regulatory approval claims are made on this page. Validation status reflects structured technical testing under defined conditions.</p>`,

          /* 3 – Validation Focus Areas */
          `<h2>Validation <span class="accent">Focus Areas</span></h2>
          <p>Independent laboratories conduct analytical measurements for before/after comparisons under chain-of-custody handling where applicable. Repeatability is evaluated through multi-run testing across varying feed salinity ranges.</p>
          <p>Validation focus areas include:</p>
          <ul>
            <li>Directional ion reduction consistency</li>
            <li>Product water recovery behavior</li>
            <li>Concentrate management profile</li>
            <li>Operational stability across extended runs (\u2265300 hours cumulative pilot operation)</li>
          </ul>
          <p>Testing results are compiled into structured reports. Public disclosures present only high-level status indicators. Detailed numerical datasets, analytical methods, and extended testing logs are available under e-NDA within the Data Room.</p>`,

          /* 4 – Standards Alignment */
          `<h2>Standards <span class="accent">Alignment</span></h2>
          <p>Alignment with international drinking-water guidance is assessed at a reference level.</p>
          <div style="font-size: 13px; border-top: 1px solid var(--card-border); padding-top: 12px; margin-bottom: 8px; color: var(--text-dim);">
            <strong>WHO Drinking-Water Guidelines</strong><br>
            Reference benchmark applied<br>
            <span style="color: var(--text-muted);">Public guidance used for parameter comparison</span>
          </div>
          <div style="font-size: 13px; border-top: 1px solid var(--card-border); padding-top: 12px; margin-bottom: 8px; color: var(--text-dim);">
            <strong>EU Drinking Water Directive</strong><br>
            Reference benchmark applied<br>
            <span style="color: var(--text-muted);">Jurisdiction-specific limits vary</span>
          </div>
          <div style="font-size: 13px; border-top: 1px solid var(--card-border); padding-top: 12px; margin-bottom: 16px; color: var(--text-dim);">
            <strong>US EPA Drinking Water Standards</strong><br>
            Reference benchmark applied<br>
            <span style="color: var(--text-muted);">Public standards used for comparative analysis</span>
          </div>
          <p>Benchmarks are used as analytical reference points only. No compliance or certification statement is implied.</p>
          <div class="note">Full parameter comparison tables are available post e-NDA.</div>`,

          /* 5 – Quality System & Governance */
          `<h2>Quality System &amp; <span class="accent">Governance</span></h2>
          <p>AQUINTAQA operates under structured internal quality governance procedures.</p>
          <p>Core elements include:</p>
          <ul>
            <li>Document version control</li>
            <li>Controlled configuration tracking</li>
            <li>Testing protocol standardization</li>
            <li>Process parameter logging</li>
            <li>Data traceability framework</li>
          </ul>
          <p>Each prototype and pilot configuration is documented with revision history and operating context. Testing protocols define feed parameters, run conditions, sampling intervals, and logging requirements.</p>
          <p>Operational data are archived and linked to configuration versions to maintain traceability across development stages.</p>
          <p>Where applicable, future industrial implementation will align with formal quality management standards appropriate to jurisdiction and deployment context.</p>
          <p>This page presents the validation framework in high-level form. Expanded technical documentation and laboratory evidence are available under structured disclosure procedures.</p>`
        ]
      },

      ru: {
        back: '← Назад',
        title: 'КАЧЕСТВО И ВАЛИДАЦИЯ',
        subtitle: 'Контроль процесса, дисциплина испытаний и внешняя верификация',
        hint: 'Прокрутите горизонтально или используйте стрелки <span>← →</span>',
        pageTitle: 'Качество и валидация — AQUINTAQA',
        cards: [
          /* 0 – Философия качества */
          `<h2>Философия <span class="accent">качества</span></h2>
          <p>AQUINTAQA разрабатывается как контролируемая инженерная система, а не как экспериментальная лабораторная концепция.</p>
          <p>Процесс управляется через определённые рабочие параметры, прослеживаемые циклы испытаний и структурированные практики ведения документации.</p>
          <p>Качество рассматривается как системное свойство, а не как декларация производительности. Каждая конфигурация оценивается в пределах заданных диапазонов фида, контролируемых рабочих режимов и воспроизводимых процедур. Стабильность процесса, направленность снижения ионной нагрузки и показатели извлечения оцениваются в документированных базовых условиях.</p>
          <p>Цель состоит не только в демонстрации технической реализуемости, но и в обеспечении предсказуемого поведения системы в рамках подтверждённых составов исходной воды и рабочих конфигураций. Все технические итерации фиксируются, ведутся под версионным контролем и рассматриваются в рамках внутренних процедур управления.</p>`,

          /* 1 – Методология испытаний */
          `<h2>Методология <span class="accent">испытаний</span></h2>
          <p>Валидационные мероприятия проводятся с использованием контролируемой подготовки образцов и документированных базовых измерений перед каждым запуском.</p>
          <p>Контур испытаний включает:</p>
          <ul>
            <li>определённые параметры солёности и состава исходной воды;</li>
            <li>контролируемую конфигурацию реактора и режимы дозирования газо-сорбентной системы;</li>
            <li>непрерывный мониторинг устойчивости процесса;</li>
            <li>структурированный отбор проб до и после обработки.</li>
          </ul>
          <p>Каждый цикл испытаний начинается с базовой характеристики исходного фида (TDS, ионный состав и ключевые параметры). После контролируемой работы в документированных условиях образцы после обработки отбираются и подготавливаются в соответствии с прослеживаемыми процедурами.</p>`,

          /* 2 – Независимая валидация */
          `<h2>Независимая <span class="accent">валидация</span></h2>
          <p>Внешнее лабораторное участие является базовым элементом валидационного процесса.</p>
          <p>Независимые испытания охватывают:</p>
          <ul>
            <li>аналитическую верификацию до и после обработки;</li>
            <li>подтверждение химических параметров;</li>
            <li>лабораторные протоколы измерений, согласованные с признанными аналитическими стандартами.</li>
          </ul>
          <p>Все взаимодействия с лабораториями документируются. Происхождение образцов, метод подготовки и процедуры обращения фиксируются для сохранения целостности данных.</p>
          <p>Рамка раскрытия информации:</p>
          <ul>
            <li>публичный сайт: только высокоуровневый статус валидации;</li>
            <li>после e-NDA: лабораторные отчёты, аналитические методы, расширенные массивы данных.</li>
          </ul>
          <p>На данной странице не заявляется наличие сертификации или регуляторного одобрения. Статус валидации отражает результаты структурированного технического тестирования в заданных условиях.</p>`,

          /* 3 – Ключевые направления валидации */
          `<h2>Ключевые направления <span class="accent">валидации</span></h2>
          <p>Независимые лаборатории проводят аналитические измерения для сравнений «до/после», при необходимости с соблюдением chain-of-custody. Воспроизводимость оценивается через многократные прогоны в различных диапазонах солёности исходной воды.</p>
          <p>Ключевые направления валидации включают:</p>
          <ul>
            <li>стабильность направленного снижения ионной нагрузки;</li>
            <li>поведение извлечения продуктовой воды;</li>
            <li>профиль управления концентратом;</li>
            <li>операционную устойчивость в ходе длительных прогонов (≥300 часов совокупной пилотной эксплуатации).</li>
          </ul>
          <p>Результаты испытаний оформляются в виде структурированных отчётов. Публичное раскрытие ограничивается только высокоуровневыми статус-индикаторами. Подробные числовые массивы данных, аналитические методы и расширенные журналы испытаний доступны после подписания e-NDA в рамках Data Room.</p>`,

          /* 4 – Соотнесение со стандартами */
          `<h2>Соотнесение со <span class="accent">стандартами</span></h2>
          <p>Соотнесение с международными ориентирами по качеству питьевой воды проводится на справочном уровне.</p>
          <div style="font-size: 13px; border-top: 1px solid var(--card-border); padding-top: 12px; margin-bottom: 8px; color: var(--text-dim);">
            <strong>Руководства ВОЗ по качеству питьевой воды</strong><br>
            Используется как справочный бенчмарк<br>
            <span style="color: var(--text-muted);">Публичные ориентиры применяются для сопоставления параметров</span>
          </div>
          <div style="font-size: 13px; border-top: 1px solid var(--card-border); padding-top: 12px; margin-bottom: 8px; color: var(--text-dim);">
            <strong>Директива ЕС по питьевой воде</strong><br>
            Используется как справочный бенчмарк<br>
            <span style="color: var(--text-muted);">Предельные значения зависят от юрисдикции</span>
          </div>
          <div style="font-size: 13px; border-top: 1px solid var(--card-border); padding-top: 12px; margin-bottom: 16px; color: var(--text-dim);">
            <strong>Стандарты US EPA по питьевой воде</strong><br>
            Используется как справочный бенчмарк<br>
            <span style="color: var(--text-muted);">Публичные стандарты применяются для сравнительного анализа</span>
          </div>
          <p>Бенчмарки используются исключительно как аналитические ориентиры. Никакое заявление о соответствии или сертификации не подразумевается.</p>
          <div class="note">Полные сравнительные таблицы параметров доступны после e-NDA.</div>`,

          /* 5 – Система качества и управление */
          `<h2>Система качества и <span class="accent">управление</span></h2>
          <p>AQUINTAQA действует в рамках структурированных внутренних процедур управления качеством.</p>
          <p>Ключевые элементы включают:</p>
          <ul>
            <li>версионный контроль документов;</li>
            <li>контролируемое отслеживание конфигураций;</li>
            <li>стандартизацию протоколов испытаний;</li>
            <li>журналирование параметров процесса;</li>
            <li>систему прослеживаемости данных.</li>
          </ul>
          <p>Каждая прототипная и пилотная конфигурация документируется с указанием истории ревизий и эксплуатационного контекста. Протоколы испытаний определяют параметры фида, условия прогона, интервалы отбора проб и требования к логированию.</p>
          <p>Операционные данные архивируются и связываются с версиями конфигураций для обеспечения прослеживаемости на всех этапах разработки.</p>
          <p>Где применимо, будущая промышленная реализация будет выравниваться с формальными стандартами управления качеством, соответствующими юрисдикции и контексту внедрения.</p>
          <p>На данной странице представлен высокоуровневый контур валидации. Расширенная техническая документация и лабораторная доказательная база доступны в рамках структурированных процедур раскрытия.</p>`
        ]
      }
    };

    /* ── Language switcher ── */
    const langBtns = document.querySelectorAll('.lang-btn');
    let currentLang = 'en';

    function setLang(lang) {
      const t = i18n[lang];

      langBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const key = el.dataset.i18nHtml;
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      if (t.cards) {
        document.querySelectorAll('[data-card-body]').forEach(el => {
          const idx = parseInt(el.dataset.cardBody);
          if (t.cards[idx] !== undefined) el.innerHTML = t.cards[idx];
        });
      }

      document.title = t.pageTitle;
      currentLang = lang;
    }

    langBtns.forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));

    /* ── Init: render English content ── */
    setLang('en');

    /* ── Rail navigation ── */
    const rail = document.getElementById('rail');
    const cards = Array.from(rail.querySelectorAll('.card'));
    const progressFill = document.getElementById('progress-fill');
    const leftBtn = document.getElementById('arrow-left');
    const rightBtn = document.getElementById('arrow-right');
    const CARD_W = 380;
    const GAP = 24;
    const STEP = CARD_W + GAP;
    let activeIndex = 0;

    function updateProgress() {
      const maxScroll = rail.scrollWidth - rail.clientWidth;
      const pct = maxScroll > 0 ? (rail.scrollLeft / maxScroll) * 100 : 0;
      progressFill.style.width = pct + '%';
      const idx = Math.round(rail.scrollLeft / STEP);
      activeIndex = Math.max(0, Math.min(idx, cards.length - 1));
    }

    const updateDots = updateProgress;

    function scrollToCard(i) {
      rail.scrollTo({ left: i * STEP, behavior: 'smooth' });
    }

    leftBtn.addEventListener('click', () => {
      const next = activeIndex <= 0 ? cards.length - 1 : activeIndex - 1;
      scrollToCard(next);
    });

    rightBtn.addEventListener('click', () => {
      const next = activeIndex >= cards.length - 1 ? 0 : activeIndex + 1;
      scrollToCard(next);
    });

    rail.addEventListener('scroll', updateDots, { passive: true });

    let isDown = false, startX, scrollStart;

    rail.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - rail.offsetLeft;
      scrollStart = rail.scrollLeft;
      rail.style.scrollSnapType = 'none';
    });

    rail.addEventListener('mouseleave', () => { isDown = false; rail.style.scrollSnapType = 'x mandatory'; });
    rail.addEventListener('mouseup', () => { isDown = false; rail.style.scrollSnapType = 'x mandatory'; });

    rail.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - rail.offsetLeft;
      const walk = (x - startX) * 1.5;
      rail.scrollLeft = scrollStart - walk;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') { rightBtn.click(); }
      if (e.key === 'ArrowLeft') { leftBtn.click(); }
    });
  })();
  </script>
  <script defer src="js/consent.js"></script>
</body>
</html>
